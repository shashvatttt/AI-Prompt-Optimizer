<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Prompt Optimizer Pro</title>
  <!-- Modern Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-area">
        <svg class="header-logo" viewBox="0 0 512 512" width="28" height="28" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00f2fe" />
              <stop offset="100%" stop-color="#a18cd1" />
            </linearGradient>
          </defs>
          <circle cx="256" cy="256" r="236" fill="#09090b" stroke="url(#logoGrad)" stroke-width="32" />
          <polygon points="280,80 170,260 255,260 220,430 340,230 255,230" fill="#ffffff" />
        </svg>
        <div class="title-sub">
          <h1>Prompt Optimizer</h1>
          <span class="badge">PRO</span>
        </div>
      </div>
      <div class="status-indicator">
        <span class="status-dot green"></span>
        <span class="status-text">Active</span>
      </div>
    </header>

    <!-- Content Area -->
    <main class="app-content">
      <!-- Section: API Credentials -->
      <section class="settings-card">
        <div class="card-header">
          <div class="card-title-container">
            <svg class="card-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
            </svg>
            <h2>Groq API Credentials</h2>
          </div>
          <a href="https://console.groq.com/keys" target="_blank" class="helper-link">Get Key</a>
        </div>
        <div class="input-group">
          <div class="password-wrapper">
            <input type="password" id="api-key-input" placeholder="Paste your Groq API Key here..." autocomplete="off" />
            <button type="button" id="toggle-password" class="icon-btn" title="Toggle visibility">
              <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
          <button id="save-settings-btn" class="glow-btn">Save Key</button>
        </div>
        <p id="save-status-msg" class="status-message"></p>
      </section>

      <!-- Section: Optimization Strategy Selector -->
      <section class="settings-card">
        <div class="card-header">
          <div class="card-title-container">
            <svg class="card-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </svg>
            <h2>Optimization Style</h2>
          </div>
        </div>
        
        <div class="style-grid">
          <!-- Card 1: Supercharged -->
          <label class="style-card">
            <input type="radio" name="opt-style" value="supercharged" checked />
            <span class="style-card-content">
              <svg class="style-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 2s-8 7-9 8c-.67 0-1.25-.26-1.71-.71L5 3 2 6l5.29 5.29c-.45.46-.71 1.04-.71 1.71 1 1 8 9 8 9l3-3-6.29-6.29c.46-.45 1.04-.71 1.71-.71 1-1 8-9 8-9z"></path>
                <path d="M9 15l-5 5"></path>
                <path d="M15 9l5-5"></path>
              </svg>
              <span class="style-title">Supercharged</span>
              <span class="style-desc">Crisp, structured instructions, step-by-step logic.</span>
            </span>
          </label>

          <!-- Card 2: Role Player -->
          <label class="style-card">
            <input type="radio" name="opt-style" value="roleplayer" />
            <span class="style-card-content">
              <svg class="style-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <circle cx="12" cy="12" r="6"></circle>
                <circle cx="12" cy="12" r="2"></circle>
              </svg>
              <span class="style-title">Role Player</span>
              <span class="style-desc">Casts AI as top-tier domain experts.</span>
            </span>
          </label>

          <!-- Card 3: Token Saver -->
          <label class="style-card">
            <input type="radio" name="opt-style" value="concise" />
            <span class="style-card-content">
              <svg class="style-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="1" y="6" width="18" height="12" rx="2" ry="2"></rect>
                <line x1="23" y1="11" x2="23" y2="13"></line>
                <line x1="6" y1="10" x2="6" y2="14"></line>
                <line x1="10" y1="10" x2="10" y2="14"></line>
                <line x1="14" y1="10" x2="14" y2="14"></line>
              </svg>
              <span class="style-title">Token Saver</span>
              <span class="style-desc">Extreme compression. Saves 50-80% tokens.</span>
            </span>
          </label>

          <!-- Card 4: Creative Explorer -->
          <label class="style-card">
            <input type="radio" name="opt-style" value="creative" />
            <span class="style-card-content">
              <svg class="style-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12c0 1.821.75 3.47 1.956 4.67A3.001 3.001 0 0 0 7 19.5h1a3 3 0 0 1 3 3v-.5z"></path>
                <circle cx="7.5" cy="10.5" r="1.5"></circle>
                <circle cx="11.5" cy="7.5" r="1.5"></circle>
                <circle cx="16.5" cy="7.5" r="1.5"></circle>
              </svg>
              <span class="style-title">Creative</span>
              <span class="style-desc">Sparks novel ideas & multiple view angles.</span>
            </span>
          </label>
        </div>

        <!-- Custom Guidelines Accordion Toggle -->
        <div class="custom-instructions-container">
          <button id="toggle-custom-rules" class="accordion-header">
            <span class="accordion-title-container">
              <svg class="accordion-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
              </svg>
              Custom Instructions & Rules
            </span>
            <svg class="chevron-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </button>
          <div id="custom-rules-body" class="accordion-content hidden">
            <textarea id="custom-rules-input" placeholder="e.g. 'Always answer in bullet points', 'Target a senior developer persona', 'Provide responses in Spanish'"></textarea>
          </div>
        </div>
      </section>

      <!-- Section: Instant Playground Sandbox -->
      <section class="settings-card playground-card">
        <div class="card-header">
          <div class="card-title-container">
            <svg class="card-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 2v7.5L3.5 20a2 2 0 0 0 1.7 3h13.6a2 2 0 0 0 1.7-3L14 9.5V2h-4z"></path>
              <line x1="8.5" y1="2" x2="15.5" y2="2"></line>
              <line x1="14" y1="14" x2="8.5" y2="14"></line>
            </svg>
            <h2>Playground Sandbox</h2>
          </div>
        </div>

        <div class="playground-layout">
          <div class="textarea-container">
            <textarea id="playground-input" placeholder="Type a draft prompt to optimize here..."></textarea>
            <div class="character-count" id="char-count-input">0 chars</div>
          </div>

          <div class="button-strip">
            <button id="optimize-sandbox-btn" class="primary-btn">
              <span>Optimize Prompt</span>
            </button>
          </div>

          <div class="output-wrapper">
            <div class="output-header">
              <span>Optimized Prompt Output</span>
              <button id="copy-output-btn" class="action-icon-btn" title="Copy to Clipboard">
                <svg id="copy-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                <svg id="check-icon" class="hidden" viewBox="0 0 24 24" width="16" height="16" stroke="#4ade80" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
              </button>
            </div>
            <textarea id="playground-output" readonly placeholder="Your polished prompt will appear here..."></textarea>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <span>AI Prompt Optimizer Pro • v1.0.0</span>
      <div class="footer-links">
        <span class="badge shortcut-badge">Cmd+Shift+O</span>
      </div>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
